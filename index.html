<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="styles.css" />
		<script src="scripts.js" defer></script>
		<script
			src="https://kit.fontawesome.com/1e723eb9a7.js"
			crossorigin="anonymous"
			defer
		></script>
		<title>OdinProject Calculator</title>
	</head>
	<body>
		<header>
			<h1>Calculator <i class="fa-solid fa-calculator"></i></h1>
			<p>
				Answers are rounded the nearest hundredth place (2 digits after
				decimal)
			</p>
		</header>

		<main>
			<section id="calculator">
				<div id="displays">
					<p id="upper-display">0</p>
					<p id="lower-display">0</p>
				</div>

				<div id="btns">
					<div id="big-btns">
						<button id="clear-btn">
							CLEAR <i class="fa-solid fa-eraser"></i>
						</button>
						<button id="del-btn">
							DELETE <i class="fa-solid fa-delete-left"></i>
						</button>
					</div>

					<div id="small-btns">
						<button data-number>7</button>
						<button data-number>8</button>
						<button data-number>9</button>
						<button data-operator>/</button>

						<button data-number>4</button>
						<button data-number>5</button>
						<button data-number>6</button>
						<button data-operator>*</button>

						<button data-number>1</button>
						<button data-number>2</button>
						<button data-number>3</button>
						<button data-operator>-</button>

						<button id="deci-btn">.</button>
						<button data-number>0</button>
						<button id="eq-btn">=</button>
						<button data-operator>+</button>
					</div>
				</div>
			</section>
		</main>
		<footer>
			<p></p>
		</footer>
	</body>
</html>
